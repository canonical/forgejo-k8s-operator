type: charm
name: forgejo-k8s
title: Forgejo K8s Operator
summary: Charmed Kubernetes operator for Forgejo.
description: |
  Deploy and configure the software forge, Forgejo.

base: ubuntu@24.04
platforms:
  amd64:
  arm64:

requires:
  database:
    interface: postgresql_client
    limit: 1
    optional: false
    description: |
      Integration to obtain a database backend for Forgejo.
  logging:
    interface: loki_push_api
    optional: true
    description: |
      Integration to push logs for loki typically through grafana-agent.
  ingress:
    # interface: ingress
    interface: traefik_route
    optional: true
    limit: 1
    description: |
      Integration to obtain an ingressed address to access Forgejo from outside the model.
      Note that you should use subdomain mode in traefik with a custom domain name.
  certificates:
    interface: tls-certificates
    limit: 1
    optional: true
    description: |
      Integration to obtain a TLS certificate for Forgejo.
      When related, Forgejo will be configured to serve over HTTPS on port 443.
      When removed, Forgejo will revert to HTTP on port 80.
  s3-credentials:
    interface: s3
    limit: 1
    optional: true
    description: |
      Integration to obtain S3-compatible storage credentials for Forgejo.
      When related, Forgejo will use S3 for attachments, LFS, avatars, repo-avatars,
      repo-archive, packages, and actions storage backends.

provides:
  metrics-endpoint:
    interface: prometheus_scrape
    optional: true
  grafana-dashboard:
    interface: grafana_dashboard
    optional: true

charm-libs:
  - lib: data_platform_libs.data_interfaces
    version: "0"
  - lib: grafana_k8s.grafana_dashboard
    version: "0"
  - lib: loki_k8s.loki_push_api
    version: "1"
  - lib: observability_libs.juju_topology
    version: "0"
  - lib: prometheus_k8s.prometheus_scrape
    version: "0"
  - lib: traefik_k8s.traefik_route
    version: "0"
  - lib: data_platform_libs.s3
    version: "0"
  - lib: tls_certificates_interface.tls_certificates
    version: "4"


containers:
  forgejo:
    resource: forgejo-image
    mounts:
      - storage: data
        location: /data

storage:
  data:
    minimum-size: 10G
    type: filesystem

resources:
  forgejo-image:
    type: oci-image
    description: OCI image for the Forgejo container
    upstream-source: codeberg.org/forgejo/forgejo:14

parts:
  charm:
    plugin: charm
    source: .
    build-packages:
      - libssl-dev
      - pkg-config

config:
  options:
    forgejo__log__level:
      description: |
        Configures the log level of Forgejo.

        Acceptable values are one of Trace, Debug, Info, Warn, Error, Critical, Fatal or None.
      default: "Info"
      type: string
    forgejo__server__domain:
      description: |
        Domain name to use as root url for Forgejo.

        If not specified, the juju application name is used. Note that when related to an ingress app like traefik,
        the final url has both domains, like <forgejo-charm-config-domain>.<ingress-domain>
      default: "forgejo.internal"
      type: string
    forgejo__openid__whitelisted_uris:
      description: |
        Comma-separated list of OpenID URIs to whitelist for sign-in/sign-up.

        When empty, no whitelist restriction is applied.
      default: ""
      type: string
    forgejo__server__disable_ssh:
      description: Disable SSH support in Forgejo.
      default: false
      type: boolean
    forgejo__service__disable_registration:
      description: Disable user self-registration.
      default: false
      type: boolean
    forgejo__service__require_signin_view:
      description: Require users to sign in to view any page.
      default: false
      type: boolean
    forgejo__service__default_keep_email_private:
      description: Set new users' email address to private by default.
      default: true
      type: boolean
    forgejo__service__default_allow_create_organization:
      description: Allow users to create organizations by default.
      default: true
      type: boolean
    forgejo__admin__disable_regular_org_creation:
      description: Disallow non-admin users from creating organizations.
      default: false
      type: boolean
    forgejo__admin__user_disabled_features:
      description: |
        Disabled features for users, could be deletion, manage_ssh_keys, manage_gpg_keys, manage_password
      default: ""
      type: string
    forgejo__admin__external_user_disabled_features:
      description: |
        Disabled features for users, could be deletion, manage_ssh_keys, manage_gpg_keys, manage_password

        This applies onlyonly  to users authenticated via OpenID or OAuth2.
      default: ""
      type: string
    forgejo__openid__enable_openid_signin:
      description: Enable sign-in via OpenID.
      default: true
      type: boolean
    forgejo__openid__enable_openid_signup:
      description: Enable sign-up via OpenID.
      default: true
      type: boolean
    forgejo__service__default_user_visibility:
      description: |
        Default visibility for new users.

        Acceptable values are "public", "limited", or "private".
      default: "public"
      type: string
    forgejo__service__default_org_visibility:
      description: |
        Default visibility for new organizations.

        Acceptable values are "public", "limited", or "private".
      default: "public"
      type: string
    forgejo__explore__disable_users_page:
      description: Disable the users explore page.
      default: false
      type: boolean
    forgejo__explore__disable_organizations_page:
      description: Disable the organizations explore page.
      default: false
      type: boolean
    forgejo__explore__disable_code_page:
      description: Disable the code explore page.
      default: false
      type: boolean
    forgejo____app_name:
      description: Name of the Forgejo instance shown in the UI.
      default: "Forgejo"
      type: string
    forgejo____app_slogan:
      description: Slogan shown below the app name in the UI.
      default: "Beyond coding. We Forge."
      type: string
    forgejo____run_mode:
      description: |
        Forgejo run mode. Use "prod" for production deployments.

        Acceptable values are "prod" or "dev".
      default: "prod"
      type: string
    forgejo____work_path:
      description: Top-level working directory for Forgejo data.
      default: "/data/gitea"
      type: string
    forgejo__lfs__path:
      description: Directory where Git LFS objects are stored.
      default: "/data/gitea/data/lfs"
      type: string
    forgejo__server__http_port:
      description: Internal HTTP port Forgejo listens on.
      default: 3000
      type: int
    forgejo__server__ssh_port:
      description: SSH port exposed to users for Git-over-SSH.
      default: 22
      type: int
    forgejo__server__lfs_start_server:
      description: Enable the built-in Git LFS server.
      default: true
      type: boolean
    forgejo__server__offline_mode:
      description: |
        Disable CDN and external avatar sources; serve all assets locally.
      default: true
      type: boolean
    forgejo__server__app_data_path:
      description: Directory for application data (attachments, avatars, etc.).
      default: "/data/gitea/data"
      type: string
    forgejo__server__ssh_domain:
      description: |
        Domain shown to users for SSH clone URLs.

        Leave empty to use the value of forgejo__server__domain.
      default: ""
      type: string
    forgejo__server__root_url:
      description: |
        Canonical root URL for Forgejo (e.g. https://git.example.com/).

        Leave empty to have it computed automatically from the domain and TLS state.
      default: ""
      type: string
    forgejo__mailer__enabled:
      description: Enable the built-in mailer for notifications and confirmations.
      default: false
      type: boolean
    forgejo__service__register_email_confirm:
      description: Require email confirmation before account activation.
      default: false
      type: boolean
    forgejo__service__enable_notify_mail:
      description: Send email notifications for issue and pull-request activity.
      default: false
      type: boolean
    forgejo__service__allow_only_external_registration:
      description: Disable local account creation; allow only OAuth/OpenID registration.
      default: false
      type: boolean
    forgejo__service__enable_captcha:
      description: Show a CAPTCHA on the registration form.
      default: true
      type: boolean
    forgejo__service__default_enable_timetracking:
      description: Enable time-tracking for new repositories by default.
      default: true
      type: boolean
    forgejo__service__no_reply_address:
      description: Email address used as the From address for no-reply notifications.
      default: "noreply.localhost"
      type: string
    forgejo__session__provider:
      description: |
        Session storage backend.

        Acceptable values are "file", "db", or "memory".
      default: "file"
      type: string
    forgejo__session__domain:
      description: |
        Sets the cookie Domain.
      default: ""
      type: string
    forgejo__log__mode:
      description: Logging output mode (e.g. "console", "file").
      default: "console"
      type: string
    forgejo__log__root_path:
      description: Directory where log files are written when log mode includes "file".
      default: "/data/gitea/log"
      type: string
    forgejo__security__install_lock:
      description: |
        Lock the installation wizard after initial setup.

        Should remain true in production to prevent re-initialisation.
      default: true
      type: boolean
    forgejo__security__password_hash_algo:
      description: Password hashing algorithm used for new accounts.
      default: "pbkdf2_hi"
      type: string
    forgejo__oauth2__enabled:
      description: Enable the OAuth2 provider (allows other apps to authenticate via Forgejo).
      default: true
      type: boolean
    forgejo__metrics__enabled:
      description: Enable the Prometheus-compatible /metrics endpoint.
      default: true
      type: boolean
    forgejo__metrics__enabled_issue_by_label:
      description: Include per-label issue counts in the metrics output.
      default: true
      type: boolean
    forgejo__metrics__enabled_issue_by_repository:
      description: Include per-repository issue counts in the metrics output.
      default: true
      type: boolean
    forgejo__cron__update_checker__enabled:
      description: Enable the periodic Forgejo update-checker cron job.
      default: true
      type: boolean
    forgejo__repository__signing__default_trust_model:
      description: |
        Default GPG signing trust model for new repositories.

        Acceptable values are "collaborator", "committer" or "collaboratorcommitter".
      default: "collaborator"
      type: string
    forgejo__repository__pull_request__default_merge_style:
      description: |
        Default merge style for pull requests.

        Acceptable values are "merge", "rebase", "rebase-merge", "squash" or "fast-forward-only".
      default: "merge"
      type: string
    forgejo__migrations__allowed_domains:
      description: |
        Comma-separated allowlist for migrating repositories.

        Leave empty to allow all domains. Wildcard is supported.
      default: ""
      type: string
    forgejo__packages__enabled:
      description: Enable the built-in package registry.
      default: true
      type: boolean
    forgejo__other__show_footer_version:
      description: Show Forgejo and Go version information in the footer.
      default: true
      type: boolean
    forgejo__security__secret_key:
      description: |
        Juju secret holding the Forgejo SECRET_KEY.
      type: secret
    forgejo__security__internal_token:
      description: |
        Juju secret holding the Forgejo INTERNAL_TOKEN.
      type: secret
    forgejo__server__lfs_jwt_secret:
      description: |
        Juju secret holding the Forgejo LFS_JWT_SECRET.
      type: secret
    forgejo__metrics__token:
      description: |
        Juju secret holding the bearer token for the Forgejo /metrics endpoint.
      type: secret

assumes:
  - juju >= 3.5
  - k8s-api

actions:
  generate-runner-secret:
    description: Generate a registration secret for a Forgejo Actions Runner.
    params:
      name:
        type: string
        description: Name of the runner (default is "runner")
      labels:
        type: string
        description: |
          comma separated list of labels supported by the runner
          (e.g. docker,ubuntu-latest,self-hosted) (default is "docker")
      scope:
        type: string
        description: owner/repo; leave empty for a global runner

  create-admin-user:
    description: Create an admin user in Forgejo with random password.
    params:
      username:
        type: string
        description: Username for the new admin user (default is "admin")
      email:
        type: string
        description: Email is required
    required:
    - username
    - email

  generate-user-token:
    description: Generate an API access token for the specified Forgejo user.
    params:
      username:
        type: string
        description: Username of the Forgejo user to generate the token for.
      token-name:
        type: string
        description: Name to assign to the generated token (default is "charm-token").
      scopes:
        type: string
        description: |
          Comma separated list of scopes to apply to access token
          Examples "all", "public-only,read:issue", "write:repository,write:user" (default is "all")
    required:
    - username

  reset-user-password:
    description: Reset the password for a Forgejo user to a new random password.
    params:
      username:
        type: string
        description: Username of the Forgejo user whose password should be reset.
      password:
        type: string
        description: New password to be set for the user.
    required:
    - username
    - password
