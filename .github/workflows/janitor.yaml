name: Janitor

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run"
        type: boolean
        default: true

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    uses: canonical/launchpad-actions/.github/workflows/janitor.yaml@69c806b0960935a6307170f6621a72e7d4720581
    with:
      dry_run: ${{ inputs.dry_run }}
      keep_workflows: "pipeline.yaml,prek.yaml"
